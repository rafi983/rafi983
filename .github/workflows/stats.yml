name: Update Language Statistics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.STATS_TOKEN }}

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Generate language stats (pie - repo based)
        uses: StefVuck/Github-Language-Stats@v1.2.0
        with:
          github_token: ${{ secrets.STATS_TOKEN }}
          visualization_types: "pie"
          output_path: "stats"
          dark_mode: true   # 🌙 dark theme

      - name: Ensure push succeeds
        run: |
          git pull --rebase origin main
          git push || echo "Push skipped"
