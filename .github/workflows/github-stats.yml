name: GitHub Stats Card
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      # Using the updated 2026 repository name
      - uses: stats-organization/github-readme-stats-action@v1
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: ./top-langs.svg
          theme: vision-friendly-dark
          show_icons: true
          # This ensures it fetches YOUR specific data
          username: ${{ github.repository_owner }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add top-langs.svg
          git commit -m "Update GitHub Language Stats" || exit 0
          git push
