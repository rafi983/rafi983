name: GitHub Stats Card
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Top Langs Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          # This tells the action specifically to make the Language card
          card: top-langs
          # All your styling goes inside the 'options' line now
          options: username=${{ github.repository_owner }}&theme=vision-friendly-dark&show_icons=true
          path: ./top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add top-langs.svg
          git commit -m "Update GitHub Language Stats" || exit 0
          git push
